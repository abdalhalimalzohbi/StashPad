name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Type-check, lint, build, package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check (host)
        run: npm run typecheck:host

      - name: Type-check (webview)
        run: npm run typecheck:webview

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build -- --production

      - name: Package VSIX
        run: npx vsce package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: stashpad-vsix-${{ github.sha }}
          path: '*.vsix'
          retention-days: 14
